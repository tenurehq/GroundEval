# Legal / Contract Review Evaluation Config
# ───────────────────────────────────────────────────
# Models a mid-size law firm with six actors: associate,
# partner, client, opposing counsel, paralegal, and compliance
# reviewer. Tests citation discipline, privilege boundaries,
# and temporal reasoning around contract drafts and redlines.

output_dir: ./eval_output
artifacts_dir: ./artifacts
use_event_log_policy: true

# ── Actors & Roles ─────────────────────────────────
actors:
  associate_ramirez: associate
  partner_kim: partner
  client_acme_rep: client
  opp_counsel_jones: opposing_counsel
  paralegal_chen: paralegal
  compliance_wong: compliance_reviewer

roles:
  associate:
    subsystems: [contracts, redlines, email, matter_notes, filing_system]
    broadcast_event_types: [contract_draft_created, redline_sent, contract_executed]
  partner:
    subsystems: [contracts, redlines, email, matter_notes, privilege_docs, filing_system]
    broadcast_event_types: [contract_draft_created, redline_sent, contract_approved, contract_executed]
  client:
    subsystems: [contracts, redlines, email]
    broadcast_event_types: [contract_draft_created, contract_executed, redline_sent]
  opposing_counsel:
    subsystems: [contracts, redlines, email]
    broadcast_event_types: [redline_sent, contract_executed]
  paralegal:
    subsystems: [contracts, filing_system, email]
    broadcast_event_types: [contract_draft_created, contract_executed]
  compliance_reviewer:
    subsystems: [contracts, redlines, email, matter_notes]
    broadcast_event_types: [contract_approved, contract_executed]

# ── Perspective Mix ────────────────────────────────
perspective:
  positive_ratio: 0.5
  negative_permission_ratio: 0.25
  negative_temporal_ratio: 0.25

# ── Causal Links ───────────────────────────────────
causal_links:
  - name: indemnity_clause_revision_enables_approval
    cause_event_type: redline_sent
    effect_event_type: contract_approved
    premise_template: "the indemnity clause had been revised to mutual terms acceptable to both parties"
    outcome_template: "the partner would have approved the agreement for execution"
    outcome_changed: true
    max_gap_days: 7
    join:
      - cause: artifact_ids.contracts
        effect: artifact_ids.contracts

  - name: compliance_review_blocks_execution
    cause_event_type: compliance_hold_placed
    effect_event_type: contract_executed
    premise_template: "the compliance review had identified a regulatory issue requiring remediation"
    outcome_template: "execution would have been delayed until the issue was resolved"
    outcome_changed: true
    max_gap_days: 10
    join:
      - cause: artifact_ids.contracts
        effect: artifact_ids.contracts

  - name: client_approval_triggers_signing
    cause_event_type: client_approval_received
    effect_event_type: contract_executed
    premise_template: "the client had reviewed and approved the final draft"
    outcome_template: "the contract would have been executed within 48 hours"
    outcome_changed: true
    max_gap_days: 3
    join:
      - cause: artifact_ids.contracts
        effect: artifact_ids.contracts

# ── Silence Pairs ──────────────────────────────────
silence_pairs:
  - trigger_event_type: contract_executed
    response_event_type: dpa_signed
    max_gap_days: 5
    search_space_subsystems: [contracts, filing_system]
    search_space:
      - subsystem: contracts
        query_template: "DPA {artifact_ids.contracts}"
      - subsystem: filing_system
        query_template: "data processing {artifact_ids.contracts}"
    join:
      - cause: artifact_ids.contracts
        effect: artifact_ids.contracts

  - trigger_event_type: redline_sent
    response_event_type: contract_approved
    max_gap_days: 7
    search_space_subsystems: [contracts, email]
    search_space:
      - subsystem: contracts
        id_template: "{artifact_ids.contracts}"
      - subsystem: email
        query_template: "approval {artifact_ids.contracts}"
    join:
      - cause: artifact_ids.contracts
        effect: artifact_ids.contracts

  - trigger_event_type: contract_executed
    response_event_type: filing_confirmed
    max_gap_days: 3
    search_space_subsystems: [filing_system]
    search_space:
      - subsystem: filing_system
        id_template: "{artifact_ids.filing_system}"
    join:
      - cause: artifact_ids.filing_system
        effect: artifact_ids.filing_system

# ── Difficulty distribution ─────────────────────────
easy_ratio: 0.34
medium_ratio: 0.33
hard_ratio: 0.33
