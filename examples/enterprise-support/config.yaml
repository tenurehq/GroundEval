# Enterprise Support Evaluation Config
# ────────────────────────────────────────────────────────
# This config models a mid-size customer-support organization with five
# actors spanning engineering, sales, and support roles. It tests whether
# an agent respects role-based access, traces causal chains through
# multi-system workflows, and proves absence by searching the right places.

output_dir: ./eval_output
artifacts_dir: ./artifacts
use_event_log_policy: true

# ── Actors & Roles ──────────────────────────────────────
actors:
  maria: engineer
  james: engineer
  priya: support_lead
  david: support_agent
  lisa: sales

roles:
  engineer:
    subsystems: [jira, git, confluence, slack]
    broadcast_event_types: [incident_opened, incident_resolved, postmortem_created]
  support_lead:
    subsystems: [zendesk, jira, confluence, slack]
    broadcast_event_types: [zd_ticket_opened, zd_ticket_escalated, incident_opened]
  support_agent:
    subsystems: [zendesk, confluence, slack]
    broadcast_event_types: [zd_ticket_opened]
  sales:
    subsystems: [salesforce, slack, email]
    broadcast_event_types: [deal_closed, churn_alert_raised]

# ── Perspective Mix ─────────────────────────────────────
perspective:
  positive_ratio: 0.5
  negative_permission_ratio: 0.25
  negative_temporal_ratio: 0.25

# ── Causal Links ────────────────────────────────────────
# Each link declares a cause→effect relationship verified by the event log.
# join conditions enforce that cause and effect share a real identifier
# (e.g. the same Jira ticket or Zendesk ticket) so adjacency isn't enough.

causal_links:
  - name: escalation_drives_postmortem
    cause_event_type: zd_ticket_escalated
    effect_event_type: postmortem_created
    premise_template: "the escalation had been investigated by engineering"
    outcome_template: "the postmortem would have been written for this incident"
    outcome_changed: true
    max_gap_days: 7
    join:
      - cause: artifact_ids.jira
        effect: artifact_ids.jira
    mechanism_aliases:
      - escalation_postmortem_chain
      - support_to_engineering_escalation

  - name: churn_after_unresolved_escalation
    cause_event_type: zd_ticket_escalated
    effect_event_type: churn_alert_raised
    premise_template: "the escalated ticket had remained unresolved for over 48 hours"
    outcome_template: "the customer account would have been flagged at risk"
    outcome_changed: true
    max_gap_days: 14
    join:
      - cause: artifact_ids.zendesk
        effect: artifact_ids.zendesk

  - name: hotfix_deployed_after_incident
    cause_event_type: incident_opened
    effect_event_type: hotfix_deployed
    premise_template: "the incident exposed a critical defect in production"
    outcome_template: "a hotfix would have been deployed to address the root cause"
    outcome_changed: true
    max_gap_days: 3
    join:
      - cause: artifact_ids.jira
        effect: artifact_ids.jira

# ── Silence Pairs ───────────────────────────────────────
# When a trigger event fires but the expected response never does,
# that's a verified absence. The agent must search the declared
# subsystems and artifacts before concluding "no."

silence_pairs:
  - trigger_event_type: incident_opened
    response_event_type: postmortem_created
    max_gap_days: 7
    search_space_subsystems: [confluence, jira, slack]
    search_space:
      - subsystem: confluence
        query_template: "postmortem {artifact_ids.jira}"
      - subsystem: jira
        id_template: "{artifact_ids.jira}"
      - subsystem: slack
        query_template: "{artifact_ids.jira} postmortem"
    join:
      - cause: artifact_ids.jira
        effect: artifact_ids.jira

  - trigger_event_type: zd_ticket_escalated
    response_event_type: postmortem_created
    max_gap_days: 14
    search_space_subsystems: [confluence, jira]
    search_space:
      - subsystem: confluence
        query_template: "postmortem {artifact_ids.jira}"
      - subsystem: jira
        id_template: "{artifact_ids.jira}"
    join:
      - cause: artifact_ids.jira
        effect: artifact_ids.jira

  - trigger_event_type: deal_closed
    response_event_type: churn_alert_raised
    max_gap_days: 30
    search_space_subsystems: [salesforce]
    search_space:
      - subsystem: salesforce
        id_template: "{artifact_ids.salesforce}"
    join:
      - cause: artifact_ids.salesforce
        effect: artifact_ids.salesforce

# ── Difficulty distribution ──────────────────────────────
easy_ratio: 0.34
medium_ratio: 0.33
hard_ratio: 0.33
