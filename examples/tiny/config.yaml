output_dir: ./eval_output

actors:
  alice: engineer
  bob: sales

roles:
  engineer:
    subsystems: [jira, git, slack, email]
    broadcast_event_types: [incident_opened]
  sales:
    subsystems: [salesforce, email, slack]

artifacts_dir: ./artifacts
events_file: ./events.jsonl

causal_links:
  - name: ticket_closed_after_escalation
    cause_event_type: escalation_opened
    effect_event_type: ticket_closed
    premise_template: "the escalation had been resolved proactively"
    outcome_template: "the ticket would have closed sooner"
    outcome_changed: true
    join:
      - cause: artifact_ids.jira
        effect: artifact_ids.jira

silence_pairs:
  - trigger_event_type: incident_opened
    response_event_type: postmortem_created
    search_space:
      - subsystem: confluence
        query_template: "postmortem {artifact_ids.jira}"
      - subsystem: jira
        id_template: "{artifact_ids.jira}"
    max_gap_days: 7