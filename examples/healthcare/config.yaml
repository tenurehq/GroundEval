# Healthcare Clinical Operations Evaluation Config
# ─────────────────────────────────────────────────────────
# Models a mid-size hospital/clinic with six actors spanning clinical,
# administrative, and billing roles. Tests whether an agent respects
# HIPAA-style access boundaries, follows lab-result release timing,
# and traces clinical decision chains through multi-system records.

output_dir: ./eval_output
artifacts_dir: ./artifacts
use_event_log_policy: true

# ── Actors & Roles ──────────────────────────────────────
actors:
  dr_chen: physician
  nurse_patel: nurse
  dr_williams: pharmacist
  biller_torres: billing_specialist
  coordinator_nguyen: care_coordinator
  advocate_brooks: patient_advocate

roles:
  physician:
    subsystems: [ehr, lab, imaging, pharmacy, secure_messages]
    broadcast_event_types: [admission_created, discharge_completed, code_blue]
  nurse:
    subsystems: [ehr, lab, pharmacy, secure_messages]
    broadcast_event_types: [admission_created, medication_administered, vital_signs_recorded]
  pharmacist:
    subsystems: [pharmacy, ehr, secure_messages]
    broadcast_event_types: [medication_ordered, medication_reconciled]
  billing_specialist:
    subsystems: [billing, ehr]
    broadcast_event_types: [discharge_completed, billing_code_submitted]
  care_coordinator:
    subsystems: [ehr, secure_messages, billing]
    broadcast_event_types: [admission_created, discharge_completed, followup_scheduled]
  patient_advocate:
    subsystems: [secure_messages, ehr]
    broadcast_event_types: [complaint_filed, discharge_completed]

# ── Perspective Mix ─────────────────────────────────────
perspective:
  positive_ratio: 0.5
  negative_permission_ratio: 0.25
  negative_temporal_ratio: 0.25

# ── Causal Links ────────────────────────────────────────
causal_links:
  - name: abnormal_lab_triggers_medication_adjustment
    cause_event_type: lab_result_released
    effect_event_type: medication_order_changed
    premise_template: "the abnormal potassium level had been reviewed and acted upon"
    outcome_template: "the patient's medication would have been adjusted"
    outcome_changed: true
    max_gap_days: 2
    join:
      - cause: artifact_ids.ehr
        effect: artifact_ids.ehr

  - name: imaging_finding_drives_surgical_decision
    cause_event_type: imaging_result_released
    effect_event_type: surgical_consult_ordered
    premise_template: "the CT scan revealed an acute finding requiring surgical evaluation"
    outcome_template: "a surgical consultation would have been ordered"
    outcome_changed: true
    max_gap_days: 3
    join:
      - cause: artifact_ids.ehr
        effect: artifact_ids.ehr

  - name: medication_error_causes_adverse_event
    cause_event_type: medication_administered
    effect_event_type: adverse_event_reported
    premise_template: "the wrong dosage had been administered"
    outcome_template: "an adverse event report would have been filed"
    outcome_changed: true
    max_gap_days: 1
    join:
      - cause: artifact_ids.ehr
        effect: artifact_ids.ehr

# ── Silence Pairs ───────────────────────────────────────
silence_pairs:
  - trigger_event_type: lab_result_released
    response_event_type: medication_order_changed
    max_gap_days: 2
    search_space_subsystems: [ehr, pharmacy]
    search_space:
      - subsystem: ehr
        id_template: "{artifact_ids.ehr}"
      - subsystem: pharmacy
        query_template: "medication change {artifact_ids.ehr}"
    join:
      - cause: artifact_ids.ehr
        effect: artifact_ids.ehr

  - trigger_event_type: admission_created
    response_event_type: followup_scheduled
    max_gap_days: 5
    search_space_subsystems: [ehr, secure_messages]
    search_space:
      - subsystem: ehr
        id_template: "{artifact_ids.ehr}"
      - subsystem: secure_messages
        query_template: "follow-up {artifact_ids.ehr}"
    join:
      - cause: artifact_ids.ehr
        effect: artifact_ids.ehr

  - trigger_event_type: discharge_completed
    response_event_type: billing_code_submitted
    max_gap_days: 3
    search_space_subsystems: [billing]
    search_space:
      - subsystem: billing
        id_template: "{artifact_ids.billing}"
    join:
      - cause: artifact_ids.billing
        effect: artifact_ids.billing

# ── Difficulty distribution ─────────────────────────────
easy_ratio: 0.34
medium_ratio: 0.33
hard_ratio: 0.33
