services:
  groundeval:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        AGENT_FRAMEWORK: 
    volumes:
      - ./data:/app/data:ro
      - ./config.yaml:/app/config.yaml:ro
      - ./output:/app/output
    environment:
      - PYTHONUNBUFFERED=1
    command: ["task", "--config", "/app/config.yaml"]