output_dir: ./eval_output
artifacts_dir: ./artifacts
use_event_log_policy: true

# Optional: limit which actors appear in perspective questions
perspective_actors: [alice, bob]

actors:
  alice: engineer
  bob: sales
  carol: support_lead

roles:
  engineer:
    subsystems: [jira, git, slack, confluence, email]
    broadcast_event_types: [incident_opened, incident_resolved]
  sales:
    subsystems: [salesforce, email, slack]
  support_lead:
    subsystems: [zendesk, slack, confluence, jira]
    broadcast_event_types: [zd_ticket_opened, zd_tickets_escalated, zd_tickets_resolved]

perspective:
  positive_ratio: 0.5
  negative_permission_ratio: 0.25
  negative_temporal_ratio: 0.25
  require_cross_subsystem_cases: true

causal_links:
  - name: escalation_caused_postmortem
    cause_event_type: escalation_opened
    effect_event_type: postmortem_created
    premise_template: "the escalation had been resolved proactively"
    outcome_template: "the postmortem would have been created sooner"
    outcome_changed: true
    max_gap_days: 7
    join:
      - cause: artifact_ids.jira
        effect: artifact_ids.jira
    mechanism_aliases:
      - postmortem from escalation
      - escalation follow-up

silence_pairs:
  - trigger_event_type: escalation_opened
    response_event_type: postmortem_created
    max_gap_days: 7
    search_space_subsystems: [confluence, jira, slack]
    search_space:
      - subsystem: confluence
        query_template: "postmortem {artifact_ids.jira}"
      - subsystem: jira
        id_template: "{artifact_ids.jira}"
      - subsystem: slack
        query_template: "{artifact_ids.jira} escalation"
    join:
      - cause: artifact_ids.jira
        effect: artifact_ids.jira

provider: anthropic
model: claude-sonnet-4-6
api_key_env: ANTHROPIC_API_KEY
temperature: 0.0
max_tokens: 1024

llm_question_prose: true
llm_model: claude-sonnet-4-6