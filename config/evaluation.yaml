# ==========================================
# System-tuning defaults.  The framework loads this file at startup and
# merges your config.yaml on top, so your domain keys (actors, roles,
# task_contracts, provider, model, api_key) always win.
#
# To customize any of these values, copy this file next to your config.yaml
# and edit it.  Or just set the key in your config.yaml; it takes priority
# either way.

# Set to an integer (e.g. 42) to get deterministic results.
seed: 42

# Output directory for eval results.
output_dir: ./eval_output

# Path to the seed artifact corpus directory.
# All .json files are loaded, one artifact per file.
artifacts_dir: ./data


# Provider to use.  Built-in choices: anthropic, openai.
provider: anthropic
temperature: 0.0
max_tokens: 1024
max_retries: 3
base_url: null